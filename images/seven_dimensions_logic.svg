<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="400" fill="#faf5ff" rx="10"/>
  
  <!-- 标题 -->
  <text x="600" y="40" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#5b21b6">七大分析维度的递进逻辑与因果链条</text>
  
  <!-- 主轴线 -->
  <line x1="80" y1="200" x2="1120" y2="200" stroke="#c4b5fd" stroke-width="3" stroke-dasharray="5,5"/>
  
  <!-- 阶段1：可行性 -->
  <g filter="url(#shadow)">
    <rect x="50" y="150" width="120" height="100" rx="10" fill="url(#grad1)"/>
    <text x="110" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">可行性</text>
    <text x="110" y="210" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#e9d5ff">商业模式能否成立</text>
    <text x="110" y="228" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#e9d5ff">→ 解决"活下来"问题</text>
  </g>
  
  <!-- 箭头1 -->
  <path d="M 180 200 L 230 200" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="205" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#d97706">验证</text>
  
  <!-- 阶段2：规模性 -->
  <g filter="url(#shadow)">
    <rect x="240" y="150" width="120" height="100" rx="10" fill="url(#grad1)"/>
    <text x="300" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">规模性</text>
    <text x="300" y="210" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#e9d5ff">市场天花板有多高</text>
    <text x="300" y="228" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#e9d5ff">→ 解决"长多大"问题</text>
  </g>
  
  <!-- 箭头2 -->
  <path d="M 370 200 L 420 200" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="395" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#d97706">扩张</text>
  
  <!-- 阶段3：防守性 -->
  <g filter="url(#shadow)">
    <rect x="430" y="150" width="120" height="100" rx="10" fill="url(#grad1)"/>
    <text x="490" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">防守性</text>
    <text x="490" y="210" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#e9d5ff">护城河有多宽</text>
    <text x="490" y="228" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#e9d5ff">→ 解决"守得住"问题</text>
  </g>
  
  <!-- 箭头3 -->
  <path d="M 560 200 L 610 200" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="585" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#d97706">稳定</text>
  
  <!-- 阶段4：盈利性 -->
  <g filter="url(#shadow)">
    <rect x="620" y="150" width="120" height="100" rx="10" fill="url(#grad1)"/>
    <text x="680" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">盈利性</text>
    <text x="680" y="210" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#e9d5ff">利润如何分配</text>
    <text x="680" y="228" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#e9d5ff">→ 解决"赚多少"问题</text>
  </g>
  
  <!-- 箭头4 -->
  <path d="M 750 200 L 800 200" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="775" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#d97706">定价</text>
  
  <!-- 阶段5：估值 -->
  <g filter="url(#shadow)">
    <rect x="810" y="150" width="120" height="100" rx="10" fill="url(#grad1)"/>
    <text x="870" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">估值</text>
    <text x="870" y="210" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#e9d5ff">价值如何定价</text>
    <text x="870" y="228" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#e9d5ff">→ 解决"值多少"问题</text>
  </g>
  
  <!-- 外部因素（上方） -->
  <g filter="url(#shadow)">
    <rect x="430" y="50" width="120" height="70" rx="10" fill="#f59e0b"/>
    <text x="490" y="80" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="white">外部因素 (PEST)</text>
    <text x="490" y="100" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#fef3c7">政治·经济·社会·技术</text>
  </g>
  <!-- 外部因素影响箭头 -->
  <path d="M 490 120 L 490 150" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrowhead2)"/>
  <text x="445" y="140" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#d97706">催化/制约</text>
  
  <!-- 景气度（下方） -->
  <g filter="url(#shadow)">
    <rect x="430" y="280" width="120" height="70" rx="10" fill="#009E73"/>
    <text x="490" y="310" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="white">景气度</text>
    <text x="490" y="330" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#d1fae5">短期业绩验证</text>
  </g>
  <!-- 景气度验证箭头 -->
  <path d="M 490 280 L 490 250" stroke="#009E73" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrowhead3)"/>
  <text x="445" y="270" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#009E73">验证/预判</text>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowhead3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#009E73"/>
    </marker>
  </defs>
  
  <!-- 底部说明 -->
  <text x="600" y="380" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#6b7280">主线：从"能不能活"到"长多大"到"守得住"到"赚多少"到"值多少"——一条完整的因果链条</text>
</svg>
